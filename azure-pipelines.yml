# CI — runs on every push to main and every pull request.
# Jobs: lint, workspace-check, package-check (matrix), test (3-platform matrix
#        with flake detection), docker smoke, security.
# Compute: Azure DevOps. Distribution: GitHub (code stays on GitHub).
#
# Prerequisites in Azure DevOps:
#   - Pipeline connected to this GitHub repo via a GitHub service connection
#   - No secrets required for CI (all steps are read-only)
#   - Optional: set pipeline variable BLOCK_ON_FLAKE=true to fail on flaky tests

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.92.0"
  # Set to 'true' in pipeline settings to fail the build when a flaky test is detected.
  BLOCK_ON_FLAKE: "false"

stages:
  - stage: CI
    displayName: CI
    jobs:

      # ── Lint ────────────────────────────────────────────────────────────────
      # Format check + Clippy with -D warnings. Linux only — output is
      # platform-independent.
      - job: Lint
        displayName: Lint
        pool:
          vmImage: ubuntu-latest
        timeoutInMinutes: 20
        steps:
          - checkout: self

          - script: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain none --no-modify-path
              echo "##vso[task.prependpath]$HOME/.cargo/bin"
              rustup toolchain install $(RUST_VERSION) --profile minimal \
                --component rustfmt clippy
            displayName: Install Rust $(RUST_VERSION)

          - task: Cache@2
            displayName: Cache Rust dependencies
            inputs:
              key: '"rust-lint" | "$(Agent.OS)" | Cargo.lock'
              restoreKeys: |
                "rust-lint" | "$(Agent.OS)"
              path: |
                $(HOME)/.cargo/registry
                $(HOME)/.cargo/git
                target

          - script: cargo fmt --all -- --check
            displayName: Check formatting

          - script: cargo clippy --locked --all-targets -- -D warnings
            displayName: Clippy (deny all warnings)

      # ── Workspace Check ──────────────────────────────────────────────────────
      # Type-checks every crate in the workspace without producing a binary.
      # Faster than a full build. Catches cross-crate type errors and broken
      # imports that cargo test on the main crate alone might miss.
      - job: WorkspaceCheck
        displayName: Workspace Check
        pool:
          vmImage: ubuntu-latest
        timeoutInMinutes: 30
        steps:
          - checkout: self

          - script: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain none --no-modify-path
              echo "##vso[task.prependpath]$HOME/.cargo/bin"
              rustup toolchain install $(RUST_VERSION) --profile minimal
            displayName: Install Rust $(RUST_VERSION)

          - task: Cache@2
            displayName: Cache Rust dependencies
            inputs:
              key: '"rust-workspace" | "$(Agent.OS)" | Cargo.lock'
              restoreKeys: |
                "rust-workspace" | "$(Agent.OS)"
              path: |
                $(HOME)/.cargo/registry
                $(HOME)/.cargo/git
                target

          - script: cargo check --workspace --locked
            displayName: Check workspace

      # ── Package Check ────────────────────────────────────────────────────────
      # Checks each public crate compiles in isolation. A crate might compile
      # as part of the workspace but fail standalone due to missing re-exports.
      - job: PackageCheck
        displayName: "Package Check"
        pool:
          vmImage: ubuntu-latest
        timeoutInMinutes: 20
        strategy:
          matrix:
            zeroclaw-types:
              package: zeroclaw-types
            zeroclaw-core:
              package: zeroclaw-core
        steps:
          - checkout: self

          - script: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain none --no-modify-path
              echo "##vso[task.prependpath]$HOME/.cargo/bin"
              rustup toolchain install $(RUST_VERSION) --profile minimal
            displayName: Install Rust $(RUST_VERSION)

          - task: Cache@2
            displayName: Cache Rust dependencies
            inputs:
              key: '"rust-pkg-$(package)" | "$(Agent.OS)" | Cargo.lock'
              restoreKeys: |
                "rust-pkg-$(package)" | "$(Agent.OS)"
              path: |
                $(HOME)/.cargo/registry
                $(HOME)/.cargo/git
                target

          - script: cargo check -p $(package) --locked
            displayName: Check $(package)

      # ── Test ────────────────────────────────────────────────────────────────
      # Full test suite on Linux, Windows, and macOS in parallel.
      # Linux and macOS include flake detection: if tests fail, they are retried
      # once. A pass on retry is flagged as a flake (non-deterministic test)
      # rather than a hard failure, unless BLOCK_ON_FLAKE=true.
      - job: Test
        displayName: "Test"
        timeoutInMinutes: 60
        strategy:
          matrix:
            Linux:
              vmImage: ubuntu-latest
            Windows:
              vmImage: windows-latest
            macOS:
              vmImage: macos-latest
        pool:
          vmImage: $(vmImage)
        steps:
          - checkout: self

          - script: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain none --no-modify-path
              echo "##vso[task.prependpath]$HOME/.cargo/bin"
              rustup toolchain install $(RUST_VERSION) --profile minimal
            displayName: Install Rust $(RUST_VERSION) (Unix)
            condition: ne(variables['Agent.OS'], 'Windows_NT')

          - script: |
              curl --proto '=https' --tlsv1.2 -sSf https://win.rustup.rs/x86_64 -o rustup-init.exe
              .\rustup-init.exe -y --default-toolchain $(RUST_VERSION) --no-modify-path
              echo ##vso[task.prependpath]%USERPROFILE%\.cargo\bin
            displayName: Install Rust $(RUST_VERSION) (Windows)
            condition: eq(variables['Agent.OS'], 'Windows_NT')

          - task: Cache@2
            displayName: Cache Rust dependencies (Unix)
            inputs:
              key: '"rust-test" | "$(Agent.OS)" | Cargo.lock'
              restoreKeys: |
                "rust-test" | "$(Agent.OS)"
              path: |
                $(HOME)/.cargo/registry
                $(HOME)/.cargo/git
                target
            condition: ne(variables['Agent.OS'], 'Windows_NT')

          - task: Cache@2
            displayName: Cache Rust dependencies (Windows)
            inputs:
              key: '"rust-test" | "$(Agent.OS)" | Cargo.lock'
              restoreKeys: |
                "rust-test" | "$(Agent.OS)"
              path: |
                $(USERPROFILE)\.cargo\registry
                $(USERPROFILE)\.cargo\git
                target
            condition: eq(variables['Agent.OS'], 'Windows_NT')

          # Unix: run with flake detection — retry once on failure.
          # If pass on retry → flake warning (not a hard failure unless BLOCK_ON_FLAKE=true).
          - bash: |
              set -euo pipefail
              mkdir -p "$(Build.ArtifactStagingDirectory)/flake"

              if cargo test --locked --verbose; then
                echo '{"status":"success","flake_suspected":false}' \
                  > "$(Build.ArtifactStagingDirectory)/flake/probe.json"
                exit 0
              fi

              echo "##vso[task.logissue type=warning]First run failed. Retrying for flake detection..."

              if cargo test --locked --verbose; then
                echo "##vso[task.logissue type=warning]Flake suspected — test passed on retry"
                echo '{"status":"flake","flake_suspected":true}' \
                  > "$(Build.ArtifactStagingDirectory)/flake/probe.json"
                if [ "$(BLOCK_ON_FLAKE)" = "true" ]; then
                  echo "BLOCK_ON_FLAKE=true — failing on suspected flake."
                  exit 1
                fi
                exit 0
              fi

              echo '{"status":"failure","flake_suspected":false}' \
                > "$(Build.ArtifactStagingDirectory)/flake/probe.json"
              exit 1
            displayName: Run tests (with flake detection)
            condition: ne(variables['Agent.OS'], 'Windows_NT')

          # Windows: simple run, no flake detection (bash not available).
          - script: cargo test --locked --verbose
            displayName: Run tests
            condition: eq(variables['Agent.OS'], 'Windows_NT')

          - task: PublishPipelineArtifact@1
            displayName: Publish flake probe result
            condition: and(ne(variables['Agent.OS'], 'Windows_NT'), always())
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/flake
              artifactName: flake-probe-$(Agent.OS)

      # ── Docker Smoke ────────────────────────────────────────────────────────
      # Builds the "dev" stage of the Dockerfile and boots the binary to confirm
      # it starts correctly inside a container.
      - job: Docker
        displayName: Docker (smoke)
        pool:
          vmImage: ubuntu-latest
        timeoutInMinutes: 25
        steps:
          - checkout: self

          - script: docker build --target dev --tag zeroclaw-ci-smoke:latest .
            displayName: Build dev stage

          - script: docker run --rm zeroclaw-ci-smoke:latest --version
            displayName: Smoke test — verify binary starts

      # ── Security ────────────────────────────────────────────────────────────
      # cargo audit: scans Cargo.lock for known CVEs and yanked crates.
      # cargo deny: enforces license allowlist and supply chain policy (deny.toml).
      - job: Security
        displayName: Security
        pool:
          vmImage: ubuntu-latest
        timeoutInMinutes: 20
        steps:
          - checkout: self

          - script: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain none --no-modify-path
              echo "##vso[task.prependpath]$HOME/.cargo/bin"
              rustup toolchain install $(RUST_VERSION) --profile minimal
            displayName: Install Rust $(RUST_VERSION)

          - task: Cache@2
            displayName: Cache Rust dependencies
            inputs:
              key: '"rust-security" | "$(Agent.OS)" | Cargo.lock'
              restoreKeys: |
                "rust-security" | "$(Agent.OS)"
              path: |
                $(HOME)/.cargo/registry
                $(HOME)/.cargo/git
                target

          - task: Cache@2
            displayName: Cache security tool binaries
            inputs:
              key: '"security-tools-v1" | "$(Agent.OS)"'
              path: $(HOME)/.cargo/bin
            continueOnError: true

          - script: command -v cargo-audit || cargo install cargo-audit --locked
            displayName: Install cargo-audit

          - script: cargo audit
            displayName: cargo audit (CVE scan)

          - script: command -v cargo-deny || cargo install cargo-deny --locked
            displayName: Install cargo-deny

          - script: cargo deny check advisories licenses sources
            displayName: cargo deny (license + supply chain)
